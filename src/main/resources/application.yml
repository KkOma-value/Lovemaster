spring:
  application:
    name: SpringAI_Learn
  profiles:
    active: local
  datasource:
    # Prefer a pooler URL when using managed Postgres services such as Supabase.
    # Example: set DB_POOLER_URL to the Session pooler connection string from the provider dashboard.
    url: ${DB_POOLER_URL:${DB_URL:jdbc:postgresql://localhost:5432/springai}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      initialization-fail-timeout: ${DB_POOL_INIT_FAIL_TIMEOUT_MS:10000}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      data-source-properties:
        connectTimeout: ${DB_CONNECT_TIMEOUT_SECONDS:10}
        socketTimeout: ${DB_SOCKET_TIMEOUT_SECONDS:30}
        tcpKeepAlive: ${DB_TCP_KEEP_ALIVE:true}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  mail:
    host: ${SPRING_MAIL_HOST:smtp.qq.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    # 注意：这里需要使用QQ邮箱的授权码，不是QQ密码
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
          debug: true
    protocol: smtp
    test-connection: false  # 禁用启动时测试连接
    default-encoding: UTF-8
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:${AI_DASHSCOPE_API_KEY:}}
      chat:
        api-key: ${spring.ai.dashscope.api-key}
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
    openai:
      api-key: ${NVIDIA_API_KEY:placeholder}
      base-url: ${NVIDIA_BASE_URL:https://integrate.api.nvidia.com}
      chat:
        enabled: false
        options:
          model: placeholder
    mcp:
      client:
        # MCP client 默认关闭，避免启动期同步 listTools 阻塞；按需设置 APP_MCP_CLIENT_ENABLED=true
        enabled: ${APP_MCP_CLIENT_ENABLED:false}
        # 避免启动期阻塞：初始化默认为 false，待 mcp-servers 可用后再启用
        initialized: ${APP_MCP_CLIENT_INITIALIZED:false}
        type: SYNC
        stdio:
          servers-configuration: classpath:mcp-servers.json


server:
  port: 8088
  servlet:
    context-path: /api

# Shared file save directory for tools (recommended to use an absolute path when running main app + mcp-servers separately)
app:
  file-save-dir: ${APP_FILE_SAVE_DIR:${user.dir}/tmp}
  jwt:
    secret: ${JWT_SECRET:lovemaster-256-bit-secret-key-for-jwt-signing-2024-default}
    access-token-expiration: 1800000
    refresh-token-expiration: 604800000
  image:
    upload-dir: ${APP_FILE_SAVE_DIR:${user.dir}/tmp}/images
    max-size: 5242880
    allowed-types: image/jpeg,image/png,image/webp
  mcp:
    autostart: ${APP_MCP_AUTOSTART:true}
  google:
    client-id: ${GOOGLE_CLIENT_ID:59540883835-shhhvumlokiqd24eb2jnjq7o6dt9rohk.apps.googleusercontent.com}
  rewrite:
    legacy-mode: ${APP_REWRITE_LEGACY_MODE:false}
    rate-limit:
      per-user-per-minute: ${APP_REWRITE_RATE_LIMIT_PER_USER_PER_MINUTE:5}
      per-ip-per-minute: ${APP_REWRITE_RATE_LIMIT_PER_IP_PER_MINUTE:20}
  knowledge:
    fanout:
      total-timeout-ms: ${APP_KNOWLEDGE_TOTAL_TIMEOUT_MS:800}
    wiki:
      enabled: ${APP_KNOWLEDGE_WIKI_ENABLED:true}
      root: ${APP_KNOWLEDGE_WIKI_ROOT:knowledge/wiki}
      hot-reload: ${APP_KNOWLEDGE_WIKI_HOT_RELOAD:true}
      hot-reload-debounce-ms: ${APP_KNOWLEDGE_WIKI_HOT_RELOAD_DEBOUNCE_MS:500}
      retrieval:
        top-n: ${APP_KNOWLEDGE_WIKI_TOP_N:3}
        title-boost: ${APP_KNOWLEDGE_WIKI_TITLE_BOOST:2.0}
        score-threshold: ${APP_KNOWLEDGE_WIKI_SCORE_THRESHOLD:0.6}
        max-chars-per-page: ${APP_KNOWLEDGE_WIKI_MAX_CHARS_PER_PAGE:400}
        total-budget-chars: ${APP_KNOWLEDGE_WIKI_TOTAL_BUDGET_CHARS:2000}
        timeout-ms: ${APP_KNOWLEDGE_WIKI_TIMEOUT_MS:200}
      graph:
        expand-hops: ${APP_KNOWLEDGE_WIKI_EXPAND_HOPS:1}
        expansion-weight: ${APP_KNOWLEDGE_WIKI_EXPANSION_WEIGHT:0.5}
    sink:
      candidate-kiko-threshold: ${APP_KNOWLEDGE_SINK_CANDIDATE_KIKO_THRESHOLD:0.82}
    cache:
      enabled: ${APP_KNOWLEDGE_CACHE_ENABLED:true}
      ttl-seconds: ${APP_KNOWLEDGE_CACHE_TTL_SECONDS:300}
      maximum-size: ${APP_KNOWLEDGE_CACHE_MAX_SIZE:2000}
    rerank:
      enabled: ${APP_KNOWLEDGE_RERANK_ENABLED:true}
      dedup-threshold: ${APP_KNOWLEDGE_RERANK_DEDUP_THRESHOLD:0.92}
      top-k: ${APP_KNOWLEDGE_RERANK_TOP_K:4}
      timeout-ms: ${APP_KNOWLEDGE_RERANK_TIMEOUT_MS:300}
      max-segments: ${APP_KNOWLEDGE_RERANK_MAX_SEGMENTS:12}
    sanitizer:
      enabled: ${APP_KNOWLEDGE_SANITIZER_ENABLED:true}
      max-content-chars: ${APP_KNOWLEDGE_SANITIZER_MAX_CHARS:4000}
    feedback:
      enabled: ${APP_KNOWLEDGE_FEEDBACK_ENABLED:true}
      helpful-threshold: ${APP_KNOWLEDGE_FEEDBACK_HELPFUL_THRESHOLD:0.8}
      min-repeat: ${APP_KNOWLEDGE_FEEDBACK_MIN_REPEAT:2}
      inbox-dir: ${APP_KNOWLEDGE_FEEDBACK_INBOX_DIR:knowledge/wiki/inbox}
      cron: ${APP_KNOWLEDGE_FEEDBACK_CRON:0 0 */6 * * *}
      batch-size: ${APP_KNOWLEDGE_FEEDBACK_BATCH_SIZE:200}
    abstractor:
      enabled: ${APP_KNOWLEDGE_ABSTRACTOR_ENABLED:true}
      max-input-chars: ${APP_KNOWLEDGE_ABSTRACTOR_MAX_INPUT_CHARS:4000}
      max-summary-chars: ${APP_KNOWLEDGE_ABSTRACTOR_MAX_SUMMARY_CHARS:280}
    review:
      topics-dir: ${APP_KNOWLEDGE_REVIEW_TOPICS_DIR:knowledge/wiki/topics}
      dedup-threshold: ${APP_KNOWLEDGE_REVIEW_DEDUP_THRESHOLD:0.85}
      list-page-size: ${APP_KNOWLEDGE_REVIEW_PAGE_SIZE:20}
    strategy:
      enabled: ${APP_KNOWLEDGE_STRATEGY_ENABLED:true}
      cron: ${APP_KNOWLEDGE_STRATEGY_CRON:0 30 */6 * * *}
      lookback-days: ${APP_KNOWLEDGE_STRATEGY_LOOKBACK_DAYS:14}
      min-samples: ${APP_KNOWLEDGE_STRATEGY_MIN_SAMPLES:3}
      top-k: ${APP_KNOWLEDGE_STRATEGY_TOP_K:20}
      gray-percent: ${APP_KNOWLEDGE_STRATEGY_GRAY_PERCENT:10}
    auto-distill:
      enabled: ${APP_KNOWLEDGE_AUTO_DISTILL_ENABLED:true}
      cron: ${APP_KNOWLEDGE_AUTO_DISTILL_CRON:0 */15 * * * *}
      min-content-length: ${APP_KNOWLEDGE_AUTO_DISTILL_MIN_CONTENT_LENGTH:80}
      lookback-hours: ${APP_KNOWLEDGE_AUTO_DISTILL_LOOKBACK_HOURS:24}
    auto-approval:
      enabled: ${APP_KNOWLEDGE_AUTO_APPROVAL_ENABLED:true}
      cron: ${APP_KNOWLEDGE_AUTO_APPROVAL_CRON:0 */10 * * * *}
      min-aggregated-score: ${APP_KNOWLEDGE_AUTO_APPROVAL_MIN_SCORE:1.5}
      negative-veto: ${APP_KNOWLEDGE_AUTO_APPROVAL_NEGATIVE_VETO:1}
      stale-days: ${APP_KNOWLEDGE_AUTO_APPROVAL_STALE_DAYS:7}
      unknown-topic-days: ${APP_KNOWLEDGE_AUTO_APPROVAL_UNKNOWN_TOPIC_DAYS:14}
      signal-weights:
        copy: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_COPY:0.6}
        dwell: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_DWELL:0.3}
        follow_up: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_FOLLOW_UP:0.4}
        quote: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_QUOTE:0.5}
        session_retention: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_SESSION_RETENTION:0.2}
        return_visit: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_RETURN_VISIT:0.7}
        thumbs_up: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_THUMBS_UP:0.8}
        thumbs_down: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_THUMBS_DOWN:-1.0}
        llm_judge_positive: ${APP_KNOWLEDGE_SIGNAL_WEIGHT_LLM_JUDGE:0.5}

management:
  endpoints:
    web:
      exposure:
        include: ${APP_MANAGEMENT_ENDPOINTS:health,info,prometheus}
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    prometheus:
      access: ${APP_MANAGEMENT_PROMETHEUS_ACCESS:read_only}
  prometheus:
    metrics:
      export:
        enabled: ${APP_MANAGEMENT_PROMETHEUS_EXPORT_ENABLED:true}
      repeat-hit-threshold: ${APP_KNOWLEDGE_SINK_REPEAT_HIT_THRESHOLD:3}
      topic-schema-path: ${APP_KNOWLEDGE_SINK_TOPIC_SCHEMA_PATH:knowledge/wiki/topic-schema.yml}
      unknown-label: ${APP_KNOWLEDGE_SINK_UNKNOWN_LABEL:unknown}

dify:
  api:
    base-url: ${DIFY_API_BASE_URL:https://api.dify.ai/v1}
    dataset-key: ${DIFY_DATASET_KEY:}
    dataset-id: ${DIFY_DATASET_ID:}
    retrieve:
      search-method: ${DIFY_RETRIEVE_SEARCH_METHOD:hybrid_search}
      reranking-enable: ${DIFY_RETRIEVE_RERANKING_ENABLE:false}
      weights: ${DIFY_RETRIEVE_WEIGHTS:0.7}
      top-k: ${DIFY_RETRIEVE_TOP_K:4}
      score-threshold-enabled: ${DIFY_RETRIEVE_SCORE_THRESHOLD_ENABLED:false}
      score-threshold: ${DIFY_RETRIEVE_SCORE_THRESHOLD:}
    timeout:
      connect-ms: ${DIFY_TIMEOUT_CONNECT_MS:5000}
      read-ms: ${DIFY_TIMEOUT_READ_MS:10000}
    retry:
      max-attempts: ${DIFY_RETRY_MAX_ATTEMPTS:2}
      backoff-ms: ${DIFY_RETRY_BACKOFF_MS:1000}

# Supabase Storage configuration
supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:conversation-images}

# springdoc-openapi配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.springai_learn.controller

# knife4j增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchApi
search-api:
  api-key: ${SEARCH_API_KEY:}

# NVIDIA NIM model names (used by NvidiaModelConfig)
nvidia:
  model:
    rewrite: ${NVIDIA_MODEL_REWRITE:qwen/qwen3.5-122b-a10b}
    tools: ${NVIDIA_MODEL_TOOLS:nvidia/llama-3.3-nemotron-super-49b-v1.5}
    brain: ${NVIDIA_MODEL_BRAIN:moonshotai/kimi-k2-thinking}
