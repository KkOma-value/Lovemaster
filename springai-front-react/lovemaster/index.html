<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lovemaster · UI 重设计</title>

<!-- Fonts: ZCOOL KuaiLe (display, 站酷快乐体), LXGW WenKai (body, 圆润), Inter (EN/numeric) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  :root{
    /* ── WARM PEACH + CREAM + SAGE — 治愈亲密 ── */
    --bg-cream:     #FBF4EC;
    --bg-peach:     #FCE7D5;
    --bg-sand:      #F5E4D1;
    --bg-card:      #FFFCF7;
    --bg-sidebar:   #F7EBDD;

    --primary:      #E89B7A;   /* warm peach-terracotta, softer than prev */
    --primary-dark: #C47B5A;
    --primary-soft: #F5C4A8;
    --rose:         #E8A4A4;   /* dusty rose accent */
    --sage:         #8FB09F;   /* soft sage for teal slot */
    --sage-soft:    #D5E3DA;

    --text-ink:     #3A2419;   /* deep warm brown */
    --text-body:    #6B4A38;
    --text-muted:   #A98872;
    --text-faint:   #C9AE97;

    --border-soft:  rgba(232, 155, 122, 0.18);
    --border-line:  rgba(107, 74, 56, 0.08);

    --shadow-card:  0 2px 12px rgba(196, 123, 90, 0.06), 0 12px 36px rgba(196, 123, 90, 0.08);
    --shadow-soft:  0 4px 16px rgba(196, 123, 90, 0.08);
    --shadow-lift:  0 18px 48px rgba(196, 123, 90, 0.18);
    --shadow-inner: inset 0 1px 0 rgba(255,255,255,0.9);

    --r-sm: 14px;
    --r-md: 20px;
    --r-lg: 28px;
    --r-xl: 36px;

    --font-display: 'ZCOOL KuaiLe', 'LXGW WenKai Screen', system-ui, sans-serif;
    --font-body:    'ZCOOL KuaiLe', 'Ma Shan Zheng', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    --font-en:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body, #root { margin:0; padding:0; height:100%; width:100%; }
  body{
    font-family: var(--font-body);
    color: var(--text-ink);
    background: var(--bg-cream);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── grain overlay — gives warmth and tactility ── */
  .grain::after{
    content:'';
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.35;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.25 0 0 0 0 0.15 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ── page background — warm radial cream → peach ── */
  .warm-bg{
    background:
      radial-gradient(1000px 600px at 15% -10%, #FDEBDC 0%, transparent 60%),
      radial-gradient(900px 700px at 95% 10%, #FAD8C2 0%, transparent 55%),
      radial-gradient(800px 900px at 80% 110%, #F9E4DA 0%, transparent 60%),
      var(--bg-cream);
  }

  /* ── display-type treatment ── */
  .display { font-family: var(--font-display); letter-spacing: 0.02em; }
  .body    { font-family: var(--font-body); }

  /* ── scrollbar ── */
  .nice-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(196,123,90,0.25); border-radius: 3px; }
  .nice-scroll::-webkit-scrollbar-thumb:hover { background: rgba(196,123,90,0.4); }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }

  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }

  ::selection { background: rgba(232, 155, 122, 0.3); color: var(--text-ink); }

  /* ── animations ── */
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes popIn  { 0% { opacity:0; transform: scale(0.85); } 60% { transform: scale(1.04); } 100% { opacity:1; transform: scale(1); } }
  @keyframes heartBeat { 0%,100% { transform: scale(1); } 12%,36% { transform: scale(1.18); } 24% { transform: scale(0.95); } }
  @keyframes dotPulse { 0%,100% { opacity:0.3; transform: scale(0.85);} 50% { opacity:1; transform: scale(1.1);} }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes blink { 0%,50% { opacity:1;} 51%,100% { opacity:0;} }
  @keyframes breathe { 0%,100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.03); filter: brightness(1.06); } }
  @keyframes shine { 0% { transform: translateX(-120%) skewX(-18deg); } 100% { transform: translateX(220%) skewX(-18deg); } }

  .float-slow { animation: floatY 6s ease-in-out infinite; }
  .float-med  { animation: floatY 4.5s ease-in-out infinite; }
  .fade-up    { animation: fadeUp 0.6s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
  .pop-in     { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  .heart-beat { animation: heartBeat 1.8s ease-in-out infinite; }
  .breathe    { animation: breathe 3.5s ease-in-out infinite; }

  .shimmer-text {
    background: linear-gradient(90deg, var(--text-muted) 0%, var(--text-muted) 40%, var(--primary) 50%, var(--text-muted) 60%, var(--text-muted) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    animation: shimmer 2.6s linear infinite;
  }

  /* ── soft cards ── */
  .soft-card{
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
  }

  .sticker-shadow{
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 -2px 0 rgba(196,123,90,0.08) inset,
      0 10px 24px rgba(196,123,90,0.14),
      0 2px 6px rgba(196,123,90,0.08);
  }

  .chip {
    display: inline-flex; align-items:center; gap:6px;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--bg-peach);
    color: var(--primary-dark);
    font-size: 12px;
    border: 1px solid rgba(232,155,122,0.22);
  }

  /* ── button primary ── */
  .btn-primary{
    position: relative;
    background: linear-gradient(180deg, #F2A987 0%, #E89B7A 50%, #D98262 100%);
    color: #FFFAF5;
    border-radius: 999px;
    padding: 12px 24px;
    font-weight: 600;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 rgba(160,98,74,0.35),
      0 8px 20px rgba(232,155,122,0.4);
    transition: transform .18s ease, box-shadow .22s ease;
    overflow: hidden;
  }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(160,98,74,0.35), 0 12px 28px rgba(232,155,122,0.55); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-primary::after{
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: translateX(-120%) skewX(-18deg);
    pointer-events: none;
  }
  .btn-primary:hover::after{ animation: shine 0.9s ease forwards; }

  .btn-ghost{
    background: rgba(255,253,249,0.6);
    border: 1px solid var(--border-soft);
    color: var(--text-body);
    border-radius: 999px;
    padding: 10px 18px;
    font-weight: 500;
    transition: all .2s ease;
  }
  .btn-ghost:hover{ background: #FFFDF9; color: var(--primary-dark); border-color: var(--primary-soft); }

  /* dotted accent line */
  .dot-divider{
    height: 1px;
    background-image: linear-gradient(90deg, var(--border-soft) 50%, transparent 50%);
    background-size: 8px 1px;
  }

  /* bubble pop */
  .bubble-in{ animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

  /* tweaks panel */
  .tweak-input[type="range"]{
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--bg-peach);
    outline: none;
  }
  .tweak-input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--primary); cursor: pointer;
    box-shadow: 0 2px 6px rgba(232,155,122,0.45);
    border: 2px solid #FFFAF5;
  }

  /* hide default focus rings, add warm ones */
  *:focus { outline: none; }
  *:focus-visible{ outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 8px; }

  /* hearts pattern background */
  .heart-pattern{
    background-image:
      radial-gradient(circle at 20% 30%, rgba(232,164,164,0.08) 0%, transparent 2%),
      radial-gradient(circle at 70% 80%, rgba(232,155,122,0.08) 0%, transparent 2%),
      radial-gradient(circle at 45% 65%, rgba(143,176,159,0.06) 0%, transparent 2%);
    background-size: 120px 120px, 160px 160px, 200px 200px;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/TweaksPanel.jsx"></script>
  <script type="text/babel" src="components/HomePage.jsx"></script>
  <script type="text/babel" src="components/ChatPage.jsx"></script>
  <script type="text/babel" src="components/AuthPage.jsx"></script>
  <script type="text/babel" src="components/AdminPage.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>
</body>
</html>
