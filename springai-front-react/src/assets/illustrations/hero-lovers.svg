<svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Background leaves -->
  <ellipse cx="30" cy="60" rx="18" ry="9" fill="#C9A87C" opacity="0.45" transform="rotate(-35 30 60)"/>
  <ellipse cx="170" cy="40" rx="14" ry="7" fill="#C9A87C" opacity="0.35" transform="rotate(25 170 40)"/>
  <ellipse cx="160" cy="180" rx="16" ry="8" fill="#DCA080" opacity="0.4" transform="rotate(-20 160 180)"/>
  <ellipse cx="20" cy="170" rx="12" ry="6" fill="#C9A87C" opacity="0.3" transform="rotate(40 20 170)"/>
  <!-- Scattered petals -->
  <circle cx="50" cy="30" r="4" fill="#E8C4A0" opacity="0.6"/>
  <circle cx="155" cy="70" r="3" fill="#E8C4A0" opacity="0.5"/>
  <circle cx="40" cy="200" r="3.5" fill="#DCA080" opacity="0.45"/>
  <circle cx="170" cy="200" r="2.5" fill="#C9A87C" opacity="0.4"/>
  <!-- Figure left (she) — body -->
  <ellipse cx="85" cy="195" rx="16" ry="6" fill="#2D1B0E" opacity="0.15"/>
  <rect x="76" y="130" width="18" height="62" rx="9" fill="#2D1B0E"/>
  <!-- Figure left — head -->
  <circle cx="85" cy="118" r="14" fill="#2D1B0E"/>
  <!-- Hair flowing -->
  <path d="M71 112 Q65 95 72 85 Q78 78 85 104" fill="#2D1B0E"/>
  <!-- Figure left — arm reaching right -->
  <path d="M94 148 Q108 142 116 148" stroke="#2D1B0E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Figure right (he) — body -->
  <ellipse cx="118" cy="195" rx="16" ry="6" fill="#2D1B0E" opacity="0.15"/>
  <rect x="109" y="130" width="18" height="62" rx="9" fill="#2D1B0E"/>
  <!-- Figure right — head -->
  <circle cx="118" cy="118" r="14" fill="#2D1B0E"/>
  <!-- Figure right — arm reaching left -->
  <path d="M109 148 Q95 142 87 148" stroke="#2D1B0E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Heart between them -->
  <path d="M101.5 136 C101.5 134 100 132 98 132 C96 132 94.5 133.5 94.5 135.5 C94.5 138 98 141 101.5 144 C105 141 108.5 138 108.5 135.5 C108.5 133.5 107 132 105 132 C103 132 101.5 134 101.5 136Z" fill="#C47B5A" opacity="0.9"/>
  <!-- Warm glow behind heart -->
  <circle cx="101.5" cy="137" r="10" fill="#E8C4A0" opacity="0.3"/>
  <!-- Top decorative arch line -->
  <path d="M60 80 Q101 55 142 80" stroke="#C9A87C" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4 3"/>
</svg>
